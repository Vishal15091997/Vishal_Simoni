<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Wedding - Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-container {
      width: 100%;
      perspective: 1000px;
      overflow-x: hidden;
      padding: 6rem 0 14rem;
      background: radial-gradient(circle at 50% 0%, #b30000 0%, #4a0000 70%, #1a0000 100%);
      position: relative;
      box-shadow: inset 0 0 150px rgba(0,0,0,0.8);
    }

    .gallery-container::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.12) 0%, transparent 50%);
      pointer-events: none;
      z-index: 2;
    }

    .wall-container {
      position: relative;
      transform-style: preserve-3d;
      transform: rotateY(8deg);
      width: fit-content;
      min-width: 100%;
      animation: 40s linear moveWall infinite;
      animation-play-state: running;
    }

    .wall-container.paused {
      animation-play-state: paused;
    }

    @keyframes moveWall {
      0% {
        transform: rotateY(8deg) translateX(0);
      }
      100% {
        transform: rotateY(8deg) translateX(-500px);
      }
    }

    .photo-row {
      position: relative;
      display: flex;
      height: 250px;
      gap: 10px;
      padding: 0 20px;
    }

    .photo-frame {
      position: relative;
      flex-shrink: 0;
      height: 80%;
      aspect-ratio: 1;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      box-shadow: 0 8px 16px rgba(139, 0, 0, 0.3);
      border: 2px solid var(--gold);
      border-radius: 8px;
    }

    .reflection {
      position: absolute;
      bottom: calc(-100% - 10px);
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleY(-1);
      opacity: 0.3;
      filter: blur(1px);
      border: 2px solid var(--gold);
      border-radius: 8px;
    }

    .reflection img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reflection-fade {
      position: absolute;
      bottom: calc(-100% - 10px);
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent 0%, rgba(26, 0, 0, 0.95) 100%);
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .photo-row {
        height: auto;
      }

      .reflection {
        bottom: calc(-100% - 10px);
      }

      .reflection-fade {
        bottom: calc(-100% - 10px);
      }
    }
  </style>
<body>
  <header class="topbar">
    <nav class="container nav-grid">
      <a class="brand" href="index.html">V &amp; S</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="couple.html">The Couple</a>
        <div class="dropdown">
          <a href="event.html">Our Story</a>
          <div class="dropdown-content">
            <a href="roka.html">Roka</a>
            <a href="engagement.html">Engagement</a>
            <a href="sangeet.html">Sangeet</a>
            <a href="haldi.html">Haldi</a>
            <a href="wedding.html">Wedding</a>
            <a href="reception.html">Reception</a>
          </div>
        </div>
        <a href="venue.html">Venue</a>
        <a href="gallery.html">Gallery</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="gallery-container">
      <div class="wall-container" id="main-wall"></div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container footer-compact-row">
      <div class="countdown" aria-live="polite">
        <div><span id="days">0</span><small>Days</small></div>
        <div><span id="hours">0</span><small>Hours</small></div>
        <div><span id="minutes">0</span><small>Minutes</small></div>
        <div><span id="seconds">0</span><small>Seconds</small></div>
      </div>
      <p class="footer-quote-inline">Two hearts. Two families. One beautiful beginning.</p>
      <div class="wedding-seal">
        <div class="seal-inner">
          <span class="seal-month">NOV</span>
          <span class="seal-day">20</span>
          <span class="seal-year">2026</span>
        </div>
      </div>
    </div>
  </footer>
  <script src="countdown.js"></script>
  <script>
    const NUM_PHOTOS = 8;
    const NUM_ROWS = 1;
    let scrollPosition = 0;

    function createPhotoWall() {
      const wall = document.getElementById('main-wall');
      const rows = [];

      for (let i = 0; i < NUM_ROWS; i++) {
        const row = document.createElement('div');
        row.classList.add('photo-row');
        rows.push(row);
      }

      for (let photoNum = 1; photoNum <= NUM_PHOTOS; photoNum++) {
        const rowIdx = (photoNum - 1) % NUM_ROWS;
        const frame = document.createElement('div');
        frame.classList.add('photo-frame');

        const imagePath = `images/photo${photoNum}.jpg`;

        frame.innerHTML = `
          <img src="${imagePath}" alt="Wedding Photo ${photoNum}" />
          <div class="reflection">
            <img src="${imagePath}" alt="Wedding Photo ${photoNum}" />
          </div>
          <div class="reflection-fade"></div>
        `;

        rows[rowIdx].appendChild(frame);
      }

      rows.forEach(row => wall.appendChild(row));
    }

    function updateWallPosition() {
      const wall = document.getElementById('main-wall');
      wall.style.transform = `rotateY(8deg) translateX(${scrollPosition}px)`;
    }

    let scrollTimeout;
    let isScrolling = false;

    window.addEventListener('wheel', (event) => {
      isScrolling = true;
      const wall = document.getElementById('main-wall');
      wall.classList.add('paused');

      scrollPosition -= event.deltaY * 0.5;
      updateWallPosition();

      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        isScrolling = false;
        wall.classList.remove('paused');
      }, 100);
    }, { passive: true });

    createPhotoWall();
  </script>
</body>
</html>
