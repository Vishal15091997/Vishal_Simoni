<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Our Wedding - Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Kaushan+Script&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .gallery-header {
      text-align: center;
      margin-bottom: 2rem;
      padding: 2rem 1rem 0;
    }

    .gallery-header h2 {
      font-size: 2rem;
      color: var(--maroon);
    }

    .gallery-container {
      width: 100%;
      perspective: 1000px;
      overflow-x: hidden;
      padding: 2rem 0;
      background: var(--bg);
    }

    .wall-container {
      position: relative;
      transform-style: preserve-3d;
      transform: rotateY(8deg);
      width: fit-content;
      min-width: 100%;
      animation: 40s linear moveWall infinite;
      animation-play-state: running;
    }

    .wall-container.paused {
      animation-play-state: paused;
    }

    @keyframes moveWall {
      0% {
        transform: rotateY(8deg) translateX(0);
      }
      100% {
        transform: rotateY(8deg) translateX(-500px);
      }
    }

    .photo-row {
      position: relative;
      display: flex;
      height: 250px;
      gap: 10px;
      padding: 0 20px;
    }

    .photo-frame {
      position: relative;
      flex-shrink: 0;
      height: 80%;
      aspect-ratio: 1;
    }

    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      box-shadow: 0 8px 16px rgba(139, 0, 0, 0.3);
      border: 2px solid var(--gold);
      border-radius: 8px;
    }

    .reflection {
      position: absolute;
      bottom: calc(-100% - 10px);
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleY(-1);
      opacity: 0.3;
      filter: blur(1px);
      border: 2px solid var(--gold);
      border-radius: 8px;
    }

    .reflection img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .reflection-fade {
      position: absolute;
      bottom: calc(-100% - 10px);
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(139, 0, 0, 0.1));
      border-radius: 8px;
    }

    @media (max-width: 768px) {
      .photo-row {
        height: auto;
      }

      .reflection {
        bottom: calc(-100% - 10px);
      }

      .reflection-fade {
        bottom: calc(-100% - 10px);
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <nav class="container nav-grid">
      <a class="brand" href="index.html">V &amp; S</a>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="event.html">Our Story</a>
        <a href="venue.html">Venue</a>
        <a href="gallery.html">Gallery</a>
      </div>
    </nav>
  </header>

  <main>
    <div class="gallery-header">
      <h2>Our Wedding Diary</h2>
    </div>

    <div class="gallery-container">
      <div class="wall-container" id="main-wall"></div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Thank you for being part of our journey.</p>
    <p style="margin-top: 0.8rem; font-style: italic; color: var(--gold);">Two hearts. Two families. One beautiful beginning.</p>
  </footer>

  <script>
    const NUM_PHOTOS = 8;
    const NUM_ROWS = 1;
    let scrollPosition = 0;

    function createPhotoWall() {
      const wall = document.getElementById('main-wall');
      const rows = [];

      for (let i = 0; i < NUM_ROWS; i++) {
        const row = document.createElement('div');
        row.classList.add('photo-row');
        rows.push(row);
      }

      for (let photoNum = 1; photoNum <= NUM_PHOTOS; photoNum++) {
        const rowIdx = (photoNum - 1) % NUM_ROWS;
        const frame = document.createElement('div');
        frame.classList.add('photo-frame');

        const imagePath = `images/photo${photoNum}.jpg`;

        frame.innerHTML = `
          <img src="${imagePath}" alt="Wedding Photo ${photoNum}" />
          <div class="reflection">
            <img src="${imagePath}" alt="Wedding Photo ${photoNum}" />
          </div>
          <div class="reflection-fade"></div>
        `;

        rows[rowIdx].appendChild(frame);
      }

      rows.forEach(row => wall.appendChild(row));
    }

    function updateWallPosition() {
      const wall = document.getElementById('main-wall');
      wall.style.transform = `rotateY(8deg) translateX(${scrollPosition}px)`;
    }

    let scrollTimeout;
    let isScrolling = false;

    window.addEventListener('wheel', (event) => {
      isScrolling = true;
      const wall = document.getElementById('main-wall');
      wall.classList.add('paused');

      scrollPosition -= event.deltaY * 0.5;
      updateWallPosition();

      clearTimeout(scrollTimeout);
      scrollTimeout = setTimeout(() => {
        isScrolling = false;
        wall.classList.remove('paused');
      }, 100);
    }, { passive: true });

    createPhotoWall();
  </script>
</body>
</html>
